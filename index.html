<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bandai Mall | Exclusive Invite</title>
  <meta name="description" content="반다이몰 친구초대 이벤트 - 추천인 ID starbees로 특별한 혜택을 시작하세요." />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0c;
      --card-bg: #16161a;
      --primary: #00f2ff; /* Neon Cyan */
      --secondary: #7000ff; /* Electric Purple */
      --text-main: #ffffff;
      --text-dim: #94a3b8;
      --accent: #ff0055;
      --glass: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Background Glow */
    .glow {
      position: fixed;
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);
      filter: blur(80px);
      opacity: 0.15;
      z-index: -1;
      top: -10vw;
      right: -10vw;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Header */
    header {
      padding: 40px 0;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 6px 16px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 14px;
      color: var(--primary);
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 24px;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Referral Card */
    .hero-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .hero-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
    }

    .id-label {
      color: var(--text-dim);
      font-size: 16px;
      margin-bottom: 8px;
    }

    .id-value {
      font-size: clamp(48px, 8vw, 72px);
      font-weight: 900;
      color: #fff;
      letter-spacing: -2px;
      margin-bottom: 32px;
      text-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 18px 40px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--primary);
      color: #000;
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 30px rgba(0, 242, 255, 0.6);
    }

    /* Info Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 60px;
    }

    .card {
      background: var(--glass);
      border: 1px solid var(--border);
      padding: 32px;
      border-radius: 24px;
      transition: 0.3s;
    }

    .card:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--primary);
    }

    .card h3 {
      font-size: 20px;
      margin-bottom: 12px;
      color: var(--primary);
    }

    .card p {
      color: var(--text-dim);
      font-size: 16px;
    }

    /* Footer */
    footer {
      padding: 80px 0 40px;
      text-align: center;
      color: var(--text-dim);
      font-size: 14px;
    }

    #copy-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: #000;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
      display: none;
      z-index: 100;
    }

    @media (max-width: 640px) {
      .hero-card { padding: 32px 20px; }
      h1 { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  
  <div class="container">
    <header>
      <div class="badge">Limited Time Offer</div>
      <h1>반다이몰의 새로운 시작,<br>특별한 혜택과 함께.</h1>
    </header>

    <main>
      <section class="hero-card">
        <div class="id-label">REFERRAL ID</div>
        <div class="id-value" id="ref-id">starbees</div>
        <button class="btn btn-primary" onclick="copyId()">추천인 ID 복사하기</button>
      </section>

      <div class="grid">
        <div class="card">
          <h3>01. 복사하기</h3>
          <p>상단의 'starbees' ID를 클릭하여 클립보드에 저장하세요.</p>
        </div>
        <div class="card">
          <h3>02. 가입하기</h3>
          <p>반다이몰 회원가입 시 추천인 입력란에 붙여넣으세요.</p>
        </div>
        <div class="card">
          <h3>03. 혜택받기</h3>
          <p>가입 즉시 지급되는 포인트와 쿠폰 혜택을 확인하세요.</p>
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 Bandai Mall Fan Page. Designed by Minara.</p>
      <p style="margin-top: 10px; opacity: 0.5;">본 페이지는 정보 제공을 목적으로 제작되었습니다.</p>
    </footer>
  </div>

  <div id="copy-toast">ID가 복사되었습니다! 🚀</div>

  <script>
    function copyId() {
      const idText = document.getElementById('ref-id').innerText;
      navigator.clipboard.writeText(idText).then(() => {
        const toast = document.getElementById('copy-toast');
        toast.style.display = 'block';
        setTimeout(() => {
          toast.style.display = 'none';
        }, 2000);
      });
    }
  </script>
</body>
</html>
